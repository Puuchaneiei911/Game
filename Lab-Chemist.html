<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab Chem Game</title>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* LAB UI */
.beaker{
  width:150px;
  height:200px;
  margin:20px auto;
  border:3px solid #94a3b8;
  border-radius:0 0 25px 25px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 15px rgba(56,189,248,.4);
}

.liquid{
  position:absolute;
  bottom:0;
  width:100%;
  height:20%;
  background:#38bdf8;
  transition:.4s;
}

.glow{
  box-shadow:0 0 20px lime;
}

.error{
  box-shadow:0 0 20px red;
}

.bubble{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  animation:rise 1s infinite;
}

@keyframes rise{
  from{bottom:0; opacity:1;}
  to{bottom:100%; opacity:0;}
}

.chem-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.chem{
  padding:10px;
  background:#1e293b;
  border-radius:10px;
  cursor:grab;
  transition:0.2s;
}
.chem:hover{
  background:#334155;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button.secondary{
  background:#475569;
}

/* RESULT TEXT */
.status{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.correct{ color:#4ade80; }
.wrong{ color:#f87171; }

.solution{
  margin-top:10px;
  color:#cbd5f5;
}

.progress{
  height:6px;
  background:#1e293b;
}
.bar{
  height:6px;
  background:#22c55e;
  width:0%;
}
</style>
</head>

<body>

<div class="container">

<h2 id="q"></h2>

<div class="progress"><div id="bar" class="bar"></div></div>

<div class="beaker" id="beaker">
  <div id="liquid" class="liquid"></div>
</div>

<p id="mix"></p>

<div id="status" class="status"></div>
<div id="solution" class="solution"></div>

<div class="chem-list" id="chemList"></div>

<button onclick="resetMix()" class="secondary">รีเซ็ต</button>
<button onclick="showAnswer()" class="secondary">ดูเฉลย</button>
<button onclick="next()" id="nextBtn" style="display:none;">ไปต่อ</button>

<div id="result" style="display:none;">
  <h2>จบเกม</h2>
  <p id="score"></p>
</div>

</div>

<script>

const reactions = [
{a:"HCl", b:"NaOH", result:"NaCl + H2O"},
{a:"AgNO3", b:"NaCl", result:"AgCl↓ + NaNO3"},
{a:"BaCl2", b:"Na2SO4", result:"BaSO4↓ + 2NaCl"},
{a:"CaCO3", b:"HCl", result:"CO2↑ + CaCl2 + H2O"},
{a:"NH3", b:"HCl", result:"NH4Cl"},
{a:"Zn", b:"HCl", result:"H2↑ + ZnCl2"},
{a:"Fe", b:"CuSO4", result:"FeSO4 + Cu"},
{a:"Na", b:"H2O", result:"NaOH + H2↑"},
];

function gen(){
  const arr=[];
  for(let i=0;i<50;i++){
    arr.push(reactions[Math.floor(Math.random()*reactions.length)]);
  }
  return arr;
}

const questions = gen();

let current=0;
let score=0;
let picked=[];

const beaker = document.getElementById("beaker");
const liquid = document.getElementById("liquid");

function load(){
  picked=[];
  document.getElementById("mix").innerText="";
  document.getElementById("status").innerText="";
  document.getElementById("solution").innerText="";
  document.getElementById("nextBtn").style.display="none";

  beaker.classList.remove("glow","error");

  liquid.style.height="20%";
  liquid.style.background="#38bdf8";

  const q = questions[current];
  document.getElementById("q").innerText =
    `ผสมอะไรถึงได้: ${q.result}`;

  const allChem = [...new Set(reactions.flatMap(r=>[r.a,r.b]))];

  const box = document.getElementById("chemList");
  box.innerHTML="";

  shuffle(allChem).slice(0,6).forEach(c=>{
    const div=document.createElement("div");
    div.className="chem";
    div.draggable=true;
    div.innerText=c;

    div.ondragstart = e => {
      e.dataTransfer.setData("text",c);
    };

    box.appendChild(div);
  });

  document.getElementById("bar").style.width =
    (current/questions.length*100)+"%";
}

document.querySelector(".beaker").ondragover = e => e.preventDefault();

document.querySelector(".beaker").ondrop = e =>{
  const chem = e.dataTransfer.getData("text");

  if(picked.length<2){
    picked.push(chem);
    document.getElementById("mix").innerText =
      picked.join(" + ");

    if(picked.length===2){
      check();
    }
  }
};

function bubbles(){
  for(let i=0;i<8;i++){
    const b=document.createElement("div");
    b.className="bubble";
    b.style.left=Math.random()*100+"%";
    liquid.appendChild(b);
    setTimeout(()=>b.remove(),1000);
  }
}

function check(){
  const q = questions[current];

  const correct =
    (picked.includes(q.a) && picked.includes(q.b));

  liquid.style.height="80%";
  bubbles();

  if(correct){
    score++;
    liquid.style.background="#22c55e";
    beaker.classList.add("glow");

    document.getElementById("status").innerText="✅ ถูก!";
    document.getElementById("status").className="status correct";

  }else{
    liquid.style.background="#ef4444";
    beaker.classList.add("error");

    document.getElementById("status").innerText="❌ ผิด!";
    document.getElementById("status").className="status wrong";
  }

  document.getElementById("solution").innerText =
    `เฉลย: ${q.a} + ${q.b}`;

  document.getElementById("nextBtn").style.display="block";
}

function next(){
  current++;
  if(current<questions.length){
    load();
  }else{
    end();
  }
}

function resetMix(){
  picked=[];
  document.getElementById("mix").innerText="";
  document.getElementById("status").innerText="";
  document.getElementById("solution").innerText="";
  liquid.style.height="20%";
  liquid.style.background="#38bdf8";
}

function showAnswer(){
  const q = questions[current];
  document.getElementById("solution").innerText =
    `เฉลย: ${q.a} + ${q.b}`;
}

function end(){
  document.getElementById("chemList").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText =
    `คะแนน ${score}/50`;
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

load();

</script>

</body>
</html>
