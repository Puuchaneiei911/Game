<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chem Lab Game</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes bubble-rise {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-150px) scale(1.2);
                opacity: 0;
            }
        }
        .animate-bubble {
            animation: bubble-rise linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-950 to-slate-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ตารางปฏิกิริยาเคมี (ม.ปลาย - ปี 1)
        const REACTIONS = [
            { a: "HCl", b: "NaOH", result: "NaCl + H2O" },
            { a: "AgNO3", b: "NaCl", result: "AgCl↓ + NaNO3" },
            { a: "BaCl2", b: "Na2SO4", result: "BaSO4↓ + 2NaCl" },
            { a: "CaCO3", b: "HCl", result: "CO2↑ + CaCl2 + H2O" },
            { a: "NH3", b: "HCl", result: "NH4Cl" },
            { a: "Zn", b: "HCl", result: "H2↑ + ZnCl2" },
            { a: "Fe", b: "CuSO4", result: "FeSO4 + Cu" },
            { a: "Na", b: "H2O", result: "NaOH + H2↑" },
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        const generateQuestions = () => {
            const arr = [];
            for (let i = 0; i < 50; i++) {
                arr.push(REACTIONS[Math.floor(Math.random() * REACTIONS.length)]);
            }
            return arr;
        };

        function ChemLabGame() {
            const [questions] = useState(generateQuestions);
            const [current, setCurrent] = useState(0);
            const [score, setScore] = useState(0);
            const [picked, setPicked] = useState([]);
            const [choices, setChoices] = useState([]);
            const [status, setStatus] = useState(null);
            const [showSolution, setShowSolution] = useState(false);
            const [gameEnded, setGameEnded] = useState(false);
            const [bubbles, setBubbles] = useState([]);

            const currentQuestion = questions[current];

            useEffect(() => {
                if (gameEnded || !currentQuestion) return;

                const allChem = [...new Set(REACTIONS.flatMap((r) => [r.a, r.b]))];
                let list = [currentQuestion.a, currentQuestion.b];

                while (list.length < 6) {
                    const rand = allChem[Math.floor(Math.random() * allChem.length)];
                    if (!list.includes(rand)) {
                        list.push(rand);
                    }
                }
                setChoices(shuffle(list));
            }, [current, gameEnded, currentQuestion]);

            const createBubbles = () => {
                const newBubbles = Array.from({ length: 12 }).map((_, i) => ({
                    id: i,
                    left: `${Math.random() * 100}%`,
                    delay: `${Math.random() * 0.8}s`,
                    duration: `${0.6 + Math.random() * 0.6}s`,
                }));
                setBubbles(newBubbles);
                setTimeout(() => setBubbles([]), 1500);
            };

            const checkAnswer = (finalPicked) => {
                const isCorrect =
                    finalPicked.includes(currentQuestion.a) &&
                    finalPicked.includes(currentQuestion.b);

                createBubbles();

                if (isCorrect) {
                    setScore((prev) => prev + 1);
                    setStatus("correct");
                } else {
                    setStatus("wrong");
                }
                setShowSolution(true);
            };

            const handleSelectChem = (chem) => {
                if (picked.length >= 2 || status) return;
                if (picked.includes(chem)) return;

                const newPicked = [...picked, chem];
                setPicked(newPicked);

                if (newPicked.length === 2) {
                    checkAnswer(newPicked);
                }
            };

            const handleDragStart = (e, chem) => {
                e.dataTransfer.setData("text/plain", chem);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                const chem = e.dataTransfer.getData("text/plain");
                if (chem) handleSelectChem(chem);
            };

            const handleResetMix = () => {
                setPicked([]);
                setStatus(null);
                setShowSolution(false);
                setBubbles([]);
            };

            const handleNext = () => {
                setPicked([]);
                setStatus(null);
                setShowSolution(false);
                setBubbles([]);
                if (current < questions.length - 1) {
                    setCurrent((prev) => prev + 1);
                } else {
                    setGameEnded(true);
                }
            };

            const progressPercent = (current / questions.length) * 100;

            let liquidColor = "bg-sky-400 shadow-[0_0_20px_#38bdf8]";
            let beakerGlow = "border-slate-500 shadow-[0_0_15px_rgba(148,163,184,0.3)]";

            if (status === "correct") {
                liquidColor = "bg-emerald-400 shadow-[0_0_25px_#34d399]";
                beakerGlow = "border-emerald-400 shadow-[0_0_30px_rgba(52,211,153,0.6)]";
            } else if (status === "wrong") {
                liquidColor = "bg-rose-500 shadow-[0_0_25px_#f43f5e]";
                beakerGlow = "border-rose-500 shadow-[0_0_30px_rgba(244,63,94,0.6)]";
            }

            if (gameEnded) {
                return (
                    <div className="bg-slate-900/60 backdrop-blur-md p-8 rounded-2xl border border-slate-800 shadow-2xl max-w-md mx-auto w-full text-center">
                        <h2 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400 mb-4 animate-pulse">🎉 จบเกมแล็บเคมี!</h2>
                        <p className="text-xl text-slate-300 mb-6">คุณทำคะแนนได้ยอดเยี่ยมมาก</p>
                        <div className="bg-slate-950 py-6 px-8 rounded-xl border border-slate-800 mb-6">
                            <span className="text-5xl font-black text-emerald-400">{score}</span>
                            <span className="text-xl text-slate-500"> / {questions.length} คะแนน</span>
                        </div>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 font-bold rounded-xl transition duration-200 active:scale-95 shadow-lg shadow-emerald-500/20">เล่นอีกครั้ง</button>
                    </div>
                );
            }

            return (
                <div className="w-full bg-slate-900/40 backdrop-blur-md p-6 sm:p-8 rounded-2xl border border-slate-800/80 shadow-2xl">
                    <div className="mb-6">
                        <div className="flex justify-between items-center mb-2 text-sm font-semibold text-slate-400">
                            <span>โจทย์ข้อที่ {current + 1} จาก {questions.length}</span>
                            <span>คะแนน: {score}</span>
                        </div>
                        <div className="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-300 ease-out" style={{ width: `${progressPercent}%` }} />
                        </div>
                    </div>

                    <h2 className="text-xl sm:text-2xl font-bold text-center mb-6 text-slate-100 min-h-[3.5rem] flex items-center justify-center bg-slate-950/40 px-4 rounded-xl border border-slate-800/50">
                        ผสมสารใดเพื่อให้ได้: <span className="text-sky-400 ml-2 font-mono">{currentQuestion?.result}</span>
                    </h2>

                    <div onDragOver={(e) => e.preventDefault()} onDrop={handleDrop} className={`w-36 h-48 mx-auto mb-4 border-4 border-t-0 rounded-b-3xl relative overflow-hidden transition-all duration-500 bg-slate-950/20 ${beakerGlow}`}>
                        <div className={`absolute bottom-0 w-full transition-all duration-500 ease-out ${liquidColor}`} style={{ height: status ? "75%" : picked.length > 0 ? "35%" : "15%" }}>
                            {bubbles.map((bubble) => (
                                <div key={bubble.id} className="absolute w-2 h-2 bg-white/70 rounded-full animate-bubble" style={{ left: bubble.left, animationDelay: bubble.delay, animationDuration: bubble.duration, bottom: "0px" }} />
                            ))}
                        </div>
                    </div>

                    <p className="text-center font-mono text-slate-300 min-h-[1.5rem] mb-2 text-sm sm:text-base">
                        {picked.length > 0 ? picked.join(" + ") : "ลากสารเคมีลงในบีกเกอร์ หรือคลิกเลือก"}
                    </p>

                    <div className="text-center text-lg font-bold min-h-[2rem] mb-4">
                        {status === "correct" && <span className="text-emerald-400 block">✅ ถูกต้องสุดยอด!</span>}
                        {status === "wrong" && <span className="text-rose-400 block">❌ ผิดพลาดทางเคมี!</span>}
                    </div>

                    <div className="min-h-[2.5rem] text-center mb-6">
                        {showSolution && (
                            <div className="inline-block px-4 py-1.5 bg-slate-950/80 border border-slate-800 rounded-lg text-slate-300 font-mono text-sm">
                                💡 สารที่ถูกต้องคือ: <span className="text-emerald-400">{currentQuestion.a} + {currentQuestion.b}</span>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-3 gap-3 mb-6">
                        {choices.map((chem, idx) => {
                            const isPicked = picked.includes(chem);
                            return (
                                <div
                                    key={idx}
                                    draggable={!status && !isPicked}
                                    onDragStart={(e) => handleDragStart(e, chem)}
                                    onClick={() => handleSelectChem(chem)}
                                    className={`p-3 text-center rounded-xl font-mono font-bold select-none transition duration-200 shadow-md ${
                                        isPicked
                                            ? "bg-slate-800/40 text-slate-600 border border-slate-800 line-through cursor-not-allowed"
                                            : status
                                            ? "bg-slate-800/50 text-slate-500 border border-slate-800/30 cursor-not-allowed"
                                            : "bg-slate-800 text-slate-200 border border-slate-700/60 hover:bg-slate-700 hover:text-white cursor-pointer active:scale-95"
                                    }`}
                                >
                                    {chem}
                                </div>
                            );
                        })}
                    </div>

                    <div className="flex flex-col sm:flex-row gap-2">
                        <button onClick={handleResetMix} disabled={!!status} className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:hover:bg-slate-800 text-slate-300 font-semibold rounded-xl transition text-sm">รีเซ็ตสาร</button>
                        <button onClick={() => setShowSolution(true)} disabled={showSolution} className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 disabled:opacity-40 disabled:hover:bg-slate-800 text-slate-300 font-semibold rounded-xl transition text-sm">ดูเฉลย</button>
                        {status && (
                            <button onClick={handleNext} className="w-full sm:flex-[2] py-2.5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold rounded-xl transition shadow-lg shadow-emerald-500/10 text-sm">
                                {current === questions.length - 1 ? "ดูสรุปคะแนน" : "ไปต่อข้อถัดไป ➔"}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // สั่งให้ React เรนเดอร์ลงใน #root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChemLabGame />);
    </script>
</body>
</html>
