<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Chem Drag Game</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}
.container{ max-width:700px; margin:auto; }

.chem-list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:20px 0;
}
.chem{
  padding:10px;
  background:#1e293b;
  border-radius:8px;
  cursor:grab;
}

.beaker{
  width:140px;
  height:180px;
  border:3px solid white;
  margin:auto;
  border-radius:0 0 20px 20px;
  position:relative;
  overflow:hidden;
}

.liquid{
  position:absolute;
  bottom:0;
  width:100%;
  height:20%;
  background:skyblue;
  transition:0.4s;
}

.bubble{
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  animation: rise 1s infinite;
}

@keyframes rise{
  0%{bottom:0; opacity:1;}
  100%{bottom:100%; opacity:0;}
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.progress{ height:6px; background:#333; }
.bar{ height:6px; background:#22c55e; width:0%; }
</style>
</head>

<body>

<div class="container">

<h2 id="q"></h2>

<div class="progress"><div id="bar" class="bar"></div></div>

<div class="beaker">
  <div id="liquid" class="liquid"></div>
</div>

<p id="mix"></p>

<div id="chemList" class="chem-list"></div>

<button onclick="resetMix()">รีเซ็ตสาร</button>
<button onclick="showAnswer()">ดูเฉลย</button>
<button onclick="next()" id="nextBtn" style="display:none;">ไปต่อ</button>

<div id="result" style="display:none;">
  <h2>จบเกม</h2>
  <p id="score"></p>
  <button onclick="location.reload()">เล่นใหม่</button>
</div>

</div>

<script>

const reactions = [
{a:"HCl", b:"NaOH", result:"NaCl + H2O"},
{a:"AgNO3", b:"NaCl", result:"AgCl↓ + NaNO3"},
{a:"BaCl2", b:"Na2SO4", result:"BaSO4↓ + 2NaCl"},
{a:"CaCO3", b:"HCl", result:"CO2↑ + CaCl2 + H2O"},
{a:"NH3", b:"HCl", result:"NH4Cl"},
{a:"Zn", b:"HCl", result:"H2↑ + ZnCl2"},
{a:"Fe", b:"CuSO4", result:"FeSO4 + Cu"},
{a:"Na", b:"H2O", result:"NaOH + H2↑"},
];

function gen(){
  const arr=[];
  for(let i=0;i<50;i++){
    arr.push(reactions[Math.floor(Math.random()*reactions.length)]);
  }
  return arr;
}

const questions = gen();

let current=0;
let score=0;
let picked=[];

const drop = document.querySelector(".beaker");
const liquid = document.getElementById("liquid");

function load(){
  picked=[];
  document.getElementById("mix").innerText="";
  document.getElementById("nextBtn").style.display="none";

  liquid.style.height="20%";
  liquid.style.background="skyblue";

  const q = questions[current];
  document.getElementById("q").innerText =
    `ผสมอะไรถึงได้: ${q.result}`;

  const allChem = [...new Set(reactions.flatMap(r=>[r.a,r.b]))];

  const box = document.getElementById("chemList");
  box.innerHTML="";

  shuffle(allChem).slice(0,6).forEach(c=>{
    const div=document.createElement("div");
    div.className="chem";
    div.draggable=true;
    div.innerText=c;

    div.ondragstart = e => {
      e.dataTransfer.setData("text",c);
    };

    box.appendChild(div);
  });

  document.getElementById("bar").style.width =
    (current/questions.length*100)+"%";
}

// drag drop
drop.ondragover = e => e.preventDefault();

drop.ondrop = e =>{
  const chem = e.dataTransfer.getData("text");

  if(picked.length<2){
    picked.push(chem);
    document.getElementById("mix").innerText =
      picked.join(" + ");

    if(picked.length===2){
      check();
    }
  }
};

function createBubbles(){
  for(let i=0;i<8;i++){
    const b=document.createElement("div");
    b.className="bubble";
    b.style.left = Math.random()*100+"%";
    liquid.appendChild(b);
    setTimeout(()=>b.remove(),1000);
  }
}

function check(){
  const q = questions[current];

  const correct =
    (picked.includes(q.a) && picked.includes(q.b));

  liquid.style.height="80%";
  createBubbles();

  if(correct){
    score++;
    liquid.style.background="lime";
  }else{
    liquid.style.background="crimson";
  }

  document.getElementById("nextBtn").style.display="block";
}

function next(){
  current++;
  if(current<questions.length){
    load();
  }else{
    end();
  }
}

function resetMix(){
  picked=[];
  document.getElementById("mix").innerText="";
  liquid.style.height="20%";
  liquid.style.background="skyblue";
}

function showAnswer(){
  const q = questions[current];
  alert(`เฉลย: ${q.a} + ${q.b}`);
}

function end(){
  document.getElementById("chemList").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText =
    `คะแนน ${score}/50`;
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

load();

</script>

</body>
</html>
