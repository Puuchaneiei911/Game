<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คุณเป็นเคะหรือเมะ?</title>

<style>

body{
    font-family:Segoe UI,sans-serif;
    background:#f4f4f4;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.question{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

label{
    display:block;
    margin:8px 0;
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    color:white;
    background:#6366f1;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#result{
    display:none;
    margin-top:20px;
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.result-title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.score{
    margin-top:15px;
    color:#666;
}

</style>

</head>
<body>

<h1>🐱 คุณเป็นเคะหรือเมะ?</h1>

<p style="text-align:center">
ตอบตามสัญชาตญาณ ห้ามคิดเกิน 3 วินาที
</p>

<div id="quiz"></div>

<button onclick="checkResult()">
ดูผลลัพธ์
</button>

<div id="result"></div>

<script>

const questions = [

[
"เพื่อนชวนไปกินข้าว",
["แล้วแต่เลย", "K"],
["ร้านไหนก็ได้ แต่ขอเลือกเอง", "D"],
["ผมจองโต๊ะแล้ว", "S"]
],

[
"เวลาสั่งข้าว",
["อะไรก็ได้", "K"],
["ขอดูเมนูก่อน", "D"],
["เอาร้านนี้", "S"]
],

[
"โดนหมาเห่า",
["เดินหนี", "K"],
["เห่ากลับ", "D"],
["จ้องกลับ", "S"]
],

[
"มีคนแซงคิว",
["ปล่อยไป", "K"],
["บ่นในใจ", "D"],
["เตือนทันที", "S"]
],

[
"คนชมว่าน่ารัก",
["เขิน", "K"],
["555555", "D"],
["รู้อยู่แล้ว", "S"]
],

[
"ทำงานกลุ่ม",
["ตามเพื่อน", "K"],
["ช่วยทุกอย่าง", "D"],
["เป็นหัวหน้า", "S"]
],

[
"ถูกหวย 10 ล้าน",
["แบ่งให้ครอบครัว", "K"],
["เที่ยวก่อน", "D"],
["ลงทุนทันที", "S"]
],

[
"เวลางอน",
["เงียบ", "K"],
["ลงสตอรี่", "D"],
["พูดตรงๆ", "S"]
],

[
"ไปคอนเสิร์ต",
["ถ่ายรูปศิลปิน", "K"],
["ถ่ายอาหาร", "D"],
["ร้องดังสุด", "S"]
],

[
"วันสิ้นโลก",
["อยู่กับคนสำคัญ", "K"],
["กินบุฟเฟต์", "D"],
["ตั้งตัวเป็นผู้นำ", "S"]
]

];

const results = {

KS:{
title:"🌸 เคะนุ่มนิ่ม",
desc:"คุณเป็นคนใจดีจนบางครั้งคนอื่นเกรงใจไม่ทัน<br><br>มีแนวโน้มจะยอมก่อนเพื่อให้เรื่องจบ แต่ถ้าวันไหนหมดความอดทน ทุกคนจะตกใจมาก"
},

KD:{
title:"🌷 เคะสายซึน",
desc:"ปากบอกไม่เป็นไร แต่ในใจเปิด PowerPoint สรุปเหตุการณ์ไว้แล้ว<br><br>ขี้เขิน ขี้งอน และจำรายละเอียดเก่งมาก"
},

SK:{
title:"🔥 เมะตัวพ่อ",
desc:"เป็นคนชอบตัดสินใจและรับผิดชอบ<br><br>ต่อให้ไม่อยากเป็นหัวหน้า สุดท้ายก็มักกลายเป็นคนคุมงานอยู่ดี"
},

SD:{
title:"😎 เมะติ๋ม",
desc:"ภายนอกดูนิ่งและมั่นใจ<br><br>แต่จริงๆ แอบมีมุมเด็กและชอบเรื่องไร้สาระพอสมควร"
},

DK:{
title:"🦆 เป็ดขี้อ้อน",
desc:"ปรับตัวเก่ง เข้ากับคนได้ง่าย<br><br>แต่ลึกๆ ก็อยากมีคนตามใจอยู่เหมือนกัน"
},

DS:{
title:"⚖️ สายสลับร่าง",
desc:"สถานการณ์เปลี่ยน คุณก็เปลี่ยน<br><br>บางวันเป็นเคะ บางวันเป็นเมะ บางวันเป็นลูกค้าส่ง Requirement ตอน 17:59"
},

KK:{
title:"💮 เคะขั้นสุด",
desc:"คุณเกิดมาเพื่อเป็นที่รักของประชาชน<br><br>Passive Skill คือโดนแซวทั้งวันโดยไม่รู้ตัว"
},

SS:{
title:"👑 เมะจักรพรรดิ",
desc:"พลังความเป็นผู้นำล้นเหลือ<br><br>ถ้าอยู่ในงานกลุ่ม ทุกคนจะหันมาถามความเห็นคุณโดยอัตโนมัติ"
},

DD:{
title:"🐱 เคะเมะควอนตัม",
desc:"ไม่มีใครรู้ว่าคุณเป็นเคะหรือเมะ<br><br>รวมถึงตัวคุณเองด้วย"
}

};

const quiz = document.getElementById("quiz");

questions.forEach((q,index)=>{

quiz.innerHTML += `
<div class="question">

<h3>${index+1}. ${q[0]}</h3>

<label>
<input type="radio" name="q${index}" value="${q[1][1]}">
${q[1][0]}
</label>

<label>
<input type="radio" name="q${index}" value="${q[2][1]}">
${q[2][0]}
</label>

<label>
<input type="radio" name="q${index}" value="${q[3][1]}">
${q[3][0]}
</label>

</div>
`;

});

function checkResult(){

let K = 0;
let S = 0;
let D = 0;

for(let i=0;i<questions.length;i++){

const answer =
document.querySelector(`input[name="q${i}"]:checked`);

if(!answer){
alert("ตอบให้ครบก่อน 😤");
return;
}

if(answer.value==="K") K++;
if(answer.value==="S") S++;
if(answer.value==="D") D++;

}

const arr = [

{type:"K",score:K},
{type:"S",score:S},
{type:"D",score:D}

].sort((a,b)=>b.score-a.score);

let key;

if(arr[0].score===arr[1].score){

if(
(arr[0].type==="K" && arr[1].type==="S") ||
(arr[0].type==="S" && arr[1].type==="K")
){
key="KK";
}
else if(
(arr[0].type==="S" && arr[1].type==="D") ||
(arr[0].type==="D" && arr[1].type==="S")
){
key="SS";
}
else{
key="DD";
}

}
else{

key = arr[0].type + arr[1].type;

}

const result = results[key];

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<div class="result-title">
${result.title}
</div>

<div>
${result.desc}
</div>

<div class="score">
คะแนนของคุณ<br><br>

🌸 เคะ : ${K}<br>
🔥 เมะ : ${S}<br>
🦆 เป็ด : ${D}
</div>

`;

document.getElementById("result")
.scrollIntoView({
behavior:"smooth"
});

}

</script>

</body>
</html>
