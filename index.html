<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คุณเป็นเคะหรือเมะ?</title>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  color:#333;
}

.container{
  background:white;
  width:90%;
  max-width:500px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:15px;
}

.bar{
  height:8px;
  background:#6366f1;
  width:0%;
}

.question{
  font-size:18px;
  font-weight:bold;
  margin-bottom:15px;
}

.option{
  display:block;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ddd;
  cursor:pointer;
  transition:.2s;
}

.option:hover{
  background:#f3f4f6;
}

.selected{
  background:#6366f1;
  color:white;
  border-color:#6366f1;
}

.nav{
  display:flex;
  gap:10px;
  margin-top:15px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  background:#aaa;
}

#result{
  display:none;
  text-align:center;
}

.result-title{
  font-size:24px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🐱 เคะหรือเมะ</h1>

<div class="progress">
  <div id="bar" class="bar"></div>
</div>

<div id="quiz">
  <div id="qText" class="question"></div>
  <div id="choices"></div>

  <div class="nav">
    <button onclick="prev()">ย้อนกลับ</button>
    <button onclick="next()">ถัดไป</button>
  </div>
</div>

<div id="result"></div>

</div>

<script>

const questions = [
["ถ้าคนที่คุณชอบทักมาว่า 'หิว'",["เดี๋ยวสั่งให้",{K:2,M:0}],["เลือกกัน",{K:1,M:1}],["จัดให้เลย",{K:0,M:2}]],
["ไปกินข้าว",["ตามหมด",{K:2,M:0}],["ช่วยเลือก",{K:1,M:1}],["จองร้าน",{K:0,M:2}]],
["ทะเลาะกัน",["ขอโทษก่อน",{K:2,M:0}],["คุยกัน",{K:1,M:1}],["ขอเวลาคิด",{K:0,M:2}]],
["คนนั้นบอกเหนื่อย",["อยู่เป็นเพื่อน",{K:2,M:0}],["ถามไหวไหม",{K:1,M:1}],["ดูแลเต็ม",{K:0,M:2}]],
["หลงทาง",["รอ",{K:2,M:0}],["เปิด map",{K:1,M:1}],["เดินนำ",{K:0,M:2}]],
];

let current=0;
let answers = new Array(questions.length).fill(null);

function load(){
  const q = questions[current];

  document.getElementById("qText").innerText =
    `ข้อ ${current+1} / ${questions.length}\n${q[0]}`;

  const box = document.getElementById("choices");
  box.innerHTML="";

  q.slice(1).forEach((opt,i)=>{
    const div = document.createElement("div");
    div.className="option";
    div.innerText = opt[0];

    if(answers[current]===i) div.classList.add("selected");

    div.onclick=()=>{
      answers[current]=i;
      load();
    };

    box.appendChild(div);
  });

  // progress
  document.getElementById("bar").style.width =
    ((current)/questions.length*100)+"%";
}

function next(){
  if(current < questions.length-1){
    current++;
    load();
  }else{
    showResult();
  }
}

function prev(){
  if(current>0){
    current--;
    load();
  }
}

function showResult(){
  let K=0, M=0;

  for(let i=0;i<questions.length;i++){
    if(answers[i]===null){
      alert("ตอบให้ครบก่อน 😤");
      current=i;
      load();
      return;
    }

    const s = questions[i][answers[i]+1][1];
    K+=s.K;
    M+=s.M;
  }

  let title="", desc="";
  const diff = Math.abs(K-M);

  if(diff<=4){title="⚖️ สายบาลานซ์";desc="คุณอยู่กลางๆ";}
  else if(K>M){title="🌸 เคะ";desc="สายอ่อนโยน";}
  else{title="🔥 เมะ";desc="สายลุย";}

  const total=K+M;
  const kP=Math.round(K/total*100);
  const mP=Math.round(M/total*100);

  document.getElementById("quiz").style.display="none";

  const el=document.getElementById("result");
  el.style.display="block";
  el.innerHTML=
    `<div class="result-title">${title}</div>
     <p>${desc}</p>
     <p>🌸 ${kP}% | 🔥 ${mP}%</p>`;
}

load();

</script>

</body>
</html>
